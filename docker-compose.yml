# Docker Compose for local development
# Usage: docker-compose up

version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=development
      # API-URL wird automatisch basierend auf der Domain generiert
      # Optional: Überschreiben mit NEXT_PUBLIC_API_BASE_URL=http://localhost:8001
    volumes:
      # Mount source code for hot reload (not the build output)
      - ./app:/app/app:ro
      - ./components:/app/components:ro
      - ./lib:/app/lib:ro
      - ./hooks:/app/hooks:ro
      - ./public:/app/public:ro
      # Don't mount node_modules or .next (use image's versions)
    command: npm run dev
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # For running with the backend locally
  # frontend-with-backend:
  #   extends: frontend
  #   depends_on:
  #     - backend
  #   environment:
  #     - NEXT_PUBLIC_API_URL=http://backend:8000

networks:
  default:
    name: gastropilot-dev
