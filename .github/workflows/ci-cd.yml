name: CI/CD Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        type: choice
        options:
          - staging
          - demo
          - production

env:
  NODE_VERSION: '22'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ============================================
  # Quality Checks (PRs + main)
  # ============================================

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check || echo "format:check not configured, skipping"

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    # Tests are optional until MSW handlers are properly configured
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          flags: unittests
          name: frontend-coverage
          fail_ci_if_error: false

      - name: Check coverage threshold
        run: |
          # Coverage threshold temporarily disabled during migration
          # TODO: Enable coverage threshold once tests are properly configured
          echo "Coverage check skipped (migration in progress)"

  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    # E2E tests are optional until backend integration is set up in CI
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Build application
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

      - name: Run E2E tests (Chromium only for PRs)
        run: npx playwright test --project=chromium
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL || 'http://localhost:8000' }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: .next/
          retention-days: 1

  # ============================================
  # Docker Build & Push (nur main)
  # ============================================

  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [lint, test-unit, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=main
            type=sha,prefix=main-
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL_STAGING || 'https://api-staging.gastropilot.app' }}
            NEXT_PUBLIC_APP_VERSION=${{ github.sha }}

      - name: Image digest
        run: echo "Image digest - ${{ steps.build.outputs.digest }}"

  # ============================================
  # Deployments
  # ============================================

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: staging
      url: https://staging.gastropilot.app
    steps:
      - name: Deploy to Staging Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 46.225.31.48
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            echo "Deploying Frontend to Staging..."

            cd /opt/gastropilot/staging

            # Login to GitHub Container Registry
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u duhrkah --password-stdin

            # Pull latest image
            docker compose pull frontend

            # Restart with new image
            docker compose up -d frontend

            # Wait for health check
            echo "Waiting for health check..."
            sleep 10

            # Verify deployment
            for i in {1..10}; do
              if curl -f -s http://localhost:3003 > /dev/null 2>&1; then
                echo "Health check passed!"
                exit 0
              fi
              echo "Attempt $i/10 - waiting..."
              sleep 3
            done

            echo "Health check failed!"
            docker compose logs --tail=50 frontend
            exit 1

      - name: Notify success
        if: success()
        run: echo "Staging deployment successful!"

  deploy-demo:
    name: Deploy to Demo
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'demo'
    environment:
      name: demo
      url: https://demo.gastropilot.app
    steps:
      - name: Deploy to Demo Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            echo "Deploying to Demo..."

            cd /opt/gastropilot/demo

            # Login to GitHub Container Registry
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull latest image
            docker compose pull frontend

            # Restart with new image
            docker compose up -d frontend

            # Wait for health check
            echo "Waiting for health check..."
            sleep 10

            # Verify deployment
            for i in {1..10}; do
              if curl -f -s http://localhost:4001/api/health > /dev/null 2>&1; then
                echo "Health check passed!"
                exit 0
              fi
              echo "Attempt $i/10 - waiting..."
              sleep 3
            done

            echo "Health check failed!"
            docker compose logs --tail=50 frontend
            exit 1

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production'
    environment:
      name: production
      url: https://app.gastropilot.app
    steps:
      - name: Deploy to Production Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            echo "Deploying to Production..."

            cd /opt/gastropilot/production

            # Login to GitHub Container Registry
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull latest image
            docker compose pull frontend

            # Restart with new image
            docker compose up -d frontend

            # Wait for health check
            echo "Waiting for health check..."
            sleep 10

            # Verify deployment
            for i in {1..10}; do
              if curl -f -s http://localhost:4000/api/health > /dev/null 2>&1; then
                echo "Health check passed!"
                exit 0
              fi
              echo "Attempt $i/10 - waiting..."
              sleep 3
            done

            echo "Health check failed!"
            docker compose logs --tail=50 frontend
            exit 1

  # ============================================
  # Notifications
  # ============================================

  notify-slack:
    name: Notify Slack
    runs-on: ubuntu-latest
    needs: [lint, test-unit, test-e2e, build]
    if: always() && github.ref == 'refs/heads/main'
    steps:
      - name: Determine status
        id: status
        run: |
          if [ "${{ needs.lint.result }}" == "success" ] && \
             [ "${{ needs.test-unit.result }}" == "success" ] && \
             [ "${{ needs.test-e2e.result }}" == "success" ] && \
             [ "${{ needs.build.result }}" == "success" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "emoji=:white_check_mark:" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "emoji=:x:" >> $GITHUB_OUTPUT
          fi

      - name: Send Slack notification
        if: env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL not set, skipping notification"
            exit 0
          fi

          STATUS="${{ steps.status.outputs.status }}"
          EMOJI="${{ steps.status.outputs.emoji }}"
          COMMIT_MSG=$(echo "${{ github.event.head_commit.message }}" | head -1 | sed 's/"/\\"/g')
          COMMIT_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)

          curl -X POST -H 'Content-type: application/json' \
            --data "{
              \"blocks\": [
                {
                  \"type\": \"header\",
                  \"text\": {
                    \"type\": \"plain_text\",
                    \"text\": \"${EMOJI} Frontend CI/CD Pipeline\"
                  }
                },
                {
                  \"type\": \"section\",
                  \"fields\": [
                    {\"type\": \"mrkdwn\", \"text\": \"*Status:* ${STATUS}\"},
                    {\"type\": \"mrkdwn\", \"text\": \"*Branch:* ${{ github.ref_name }}\"},
                    {\"type\": \"mrkdwn\", \"text\": \"*Commit:* ${COMMIT_SHORT}\"},
                    {\"type\": \"mrkdwn\", \"text\": \"*Actor:* ${{ github.actor }}\"}
                  ]
                },
                {
                  \"type\": \"section\",
                  \"text\": {
                    \"type\": \"mrkdwn\",
                    \"text\": \"*Message:* ${COMMIT_MSG}\"
                  }
                },
                {
                  \"type\": \"context\",
                  \"elements\": [
                    {
                      \"type\": \"mrkdwn\",
                      \"text\": \"<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Workflow>\"
                    }
                  ]
                }
              ]
            }" \
            "$SLACK_WEBHOOK_URL"
