name: Detect Environment and Deploy Frontend

on:
  push:
    branches:
      - main
      - demo
      - staging
      - test
    paths-ignore:
      - 'README.md'
      - 'LICENSE.md'
    #  - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        type: choice
        options:
          - production
          - demo
          - staging
          - test

jobs:
  detect-environment:
    name: Detect Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
      env_upper: ${{ steps.set-env.outputs.env_upper }}
      port: ${{ steps.set-env.outputs.port }}
      screen_session: ${{ steps.set-env.outputs.screen_session }}
    steps:
      - name: Set environment from branch or input
        id: set-env
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            ENV="${{ github.event.inputs.environment }}"
          else
            BRANCH="${{ github.ref_name }}"
            case "$BRANCH" in
              main|production)
                ENV="production"
                ;;
              demo)
                ENV="demo"
                ;;
              staging)
                ENV="staging"
                ;;
              test)
                ENV="test"
                ;;
              *)
                echo "ERROR: Unknown branch: $BRANCH"
                exit 1
                ;;
            esac
          fi
          
          # Set environment-specific values (only PORT and SCREEN_SESSION, 
          # DEPLOY_PATH and HEALTH_URL come from environment secrets)
          case "$ENV" in
            production)
              PORT="4000"
              SCREEN_SESSION="app-production"
              ;;
            demo)
              PORT="4001"
              SCREEN_SESSION="app-demo"
              ;;
            staging)
              PORT="4002"
              SCREEN_SESSION="app-staging"
              ;;
            test)
              PORT="4003"
              SCREEN_SESSION="app-test"
              ;;
            *)
              echo "ERROR: Unknown environment: $ENV"
              exit 1
              ;;
          esac
          
          ENV_UPPER=$(echo "$ENV" | tr '[:lower:]' '[:upper:]')
          
          echo "environment=$ENV" >> $GITHUB_OUTPUT
          echo "env_upper=$ENV_UPPER" >> $GITHUB_OUTPUT
          echo "port=$PORT" >> $GITHUB_OUTPUT
          echo "screen_session=$SCREEN_SESSION" >> $GITHUB_OUTPUT
          
          echo "✓ Detected environment: $ENV"
          echo "  Port: $PORT"
          echo "  Screen Session: $SCREEN_SESSION"

  deploy:
    name: Deploy to ${{ needs.detect-environment.outputs.environment }}
    needs: detect-environment
    runs-on: ubuntu-latest
    environment: ${{ needs.detect-environment.outputs.environment }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: |
          if [ -f "package-lock.json" ]; then
            echo "package-lock.json found, using ci mode..."
            npm ci
          else
            echo "No package-lock.json found, running npm install..."
            npm install
          fi

      - name: Set environment variables
        id: set-vars
        run: |
          ENV="${{ needs.detect-environment.outputs.environment }}"
          ENV_UPPER="${{ needs.detect-environment.outputs.env_upper }}"
          PORT="${{ needs.detect-environment.outputs.port }}"
          SCREEN_SESSION="${{ needs.detect-environment.outputs.screen_session }}"
          DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
          HEALTH_URL="${{ secrets.HEALTH_URL }}"
          
          echo "ENV=$ENV" >> $GITHUB_ENV
          echo "ENV_UPPER=$ENV_UPPER" >> $GITHUB_ENV
          echo "PORT=$PORT" >> $GITHUB_ENV
          echo "SCREEN_SESSION=$SCREEN_SESSION" >> $GITHUB_ENV
          echo "DEPLOY_PATH=$DEPLOY_PATH" >> $GITHUB_ENV
          echo "HEALTH_URL=$HEALTH_URL" >> $GITHUB_ENV
          
          echo "✓ Environment variables set:"
          echo "  ENV: $ENV"
          echo "  PORT: $PORT"
          echo "  SCREEN_SESSION: $SCREEN_SESSION"
          echo "  DEPLOY_PATH: $DEPLOY_PATH"
          echo "  HEALTH_URL: $HEALTH_URL"

      - name: Create .env file for build
        run: |
          echo "${{ secrets.FRONTEND_ENV }}" > .env
          echo "✓ .env file created for build (content length: $(wc -c < .env) bytes)"
          echo "Verifying .env file (first 3 lines, no secrets):"
          head -3 .env | sed 's/=.*/=***/' || true

      - name: Build application
        run: npm run build
        env:
          NODE_ENV: production

      - name: Install production dependencies
        run: |
          echo "Installing production dependencies only..."
          npm ci --omit=dev
          echo "✓ Production dependencies installed"

      - name: Create deployment package
        run: |
          mkdir -p deploy
          cp -r .next deploy/
          cp -r public deploy/ 2>/dev/null || true
          cp package.json deploy/
          cp package-lock.json deploy/ 2>/dev/null || true
          cp next.config.ts deploy/ 2>/dev/null || true
          cp next.config.js deploy/ 2>/dev/null || true
          # Kopiere node_modules (nur Production-Dependencies)
          cp -r node_modules deploy/
          echo "✓ Deployment package prepared (including node_modules)"
          # .env wird separat übertragen, nicht im Deployment-Paket
          tar -czf frontend-${ENV}.tar.gz deploy/

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          scp -o StrictHostKeyChecking=no frontend-${ENV}.tar.gz ${SSH_USER}@${SSH_HOST}:/tmp/
          scp -o StrictHostKeyChecking=no .env ${SSH_USER}@${SSH_HOST}:/tmp/frontend-${ENV}.env
          
          ssh -o StrictHostKeyChecking=no ${SSH_USER}@${SSH_HOST} bash << EOF
            set -e
            export DEPLOY_PATH="${DEPLOY_PATH}"
            export SCREEN_SESSION="${SCREEN_SESSION}"
            export PORT="${PORT}"
            
            echo "Ensuring deployment directory exists..."
            mkdir -p "\$DEPLOY_PATH"

            cd \$DEPLOY_PATH
            echo "Current directory: \$(pwd)"
            echo "Directory contents before extraction:"
            ls -la || true
            
            # Backup bestehendes .next Verzeichnis
            if [ -d ".next" ]; then
              mv .next .next.backup.\$(date +%s) || true
              echo "Backed up existing .next directory"
            fi
            
            # Backup bestehende node_modules (falls vorhanden)
            if [ -d "node_modules" ]; then
              mv node_modules node_modules.backup.\$(date +%s) || true
              echo "Backed up existing node_modules directory"
            fi
            
            # Extrahiere Deployment-Paket
            echo "Extracting deployment package..."
            tar -xzf /tmp/frontend-${ENV}.tar.gz
            
            echo "Directory contents after extraction:"
            ls -la || true
            
            # Verschiebe Dateien aus deploy/ ins aktuelle Verzeichnis
            if [ -d "deploy" ]; then
              echo "Moving files from deploy/ directory..."
              # Verschiebe alle Dateien und Verzeichnisse
              for item in deploy/* deploy/.[!.]*; do
                if [ -e "\$item" ]; then
                  mv "\$item" . 2>/dev/null || true
                  echo "Moved: \$(basename \$item)"
                fi
              done
              rm -rf deploy
              echo "Removed deploy/ directory"
            fi
            
            echo "Directory contents after moving files:"
            ls -la || true
            
            # Übertrage .env Datei (MUSS vor dem Start vorhanden sein)
            if [ -f "/tmp/frontend-${ENV}.env" ]; then
              echo "Copying .env file..."
              cp /tmp/frontend-${ENV}.env .env
              chmod 600 .env
              echo "✓ .env file copied and secured"
              echo "Verifying .env file content (first 3 lines, no secrets):"
              head -3 .env | sed 's/=.*/=***/' || true
              rm -f /tmp/frontend-${ENV}.env
            else
              echo "ERROR: .env file not found at /tmp/frontend-${ENV}.env"
              exit 1
            fi
            
            # Prüfe ob package.json existiert
            if [ ! -f "package.json" ]; then
              echo "ERROR: package.json not found after deployment!"
              exit 1
            fi
            echo "✓ package.json found"
            
            # Prüfe ob node_modules existiert (sollte bereits im Deployment-Paket enthalten sein)
            if [ ! -d "node_modules" ]; then
              echo "ERROR: node_modules directory not found after deployment!"
              echo "Production dependencies should be included in deployment package"
              exit 1
            fi
            echo "✓ node_modules found (production dependencies included in package)"
            
            # Stoppe bestehende Screen-Session und alle Node-Prozesse
            echo "Stopping existing processes..."
            if screen -list | grep -q "\$SCREEN_SESSION"; then
              echo "Stopping existing screen session: \$SCREEN_SESSION"
              screen -S "\$SCREEN_SESSION" -X stuff \$'\003' || true
              sleep 3
              screen -S "\$SCREEN_SESSION" -X quit || true
              sleep 2
            fi
            
            # Stoppe alle Node-Prozesse auf Port (falls noch laufend)
            echo "Killing any remaining Node processes on port \$PORT..."
            pkill -9 -f "node.*next.*\$PORT" || true
            pkill -9 -f "next.*start.*\$PORT" || true
            sleep 3
            
            # Prüfe ob Port noch belegt ist
            if lsof -ti:\$PORT > /dev/null 2>&1; then
              echo "Port \$PORT still in use, killing process..."
              lsof -ti:\$PORT | xargs kill -9 || true
              sleep 2
            fi
            
            # Prüfe nochmal ob Port frei ist
            if lsof -ti:\$PORT > /dev/null 2>&1; then
              echo "WARNING: Port \$PORT is still in use after cleanup attempts"
            else
              echo "✓ Port \$PORT is free"
            fi
            
            # Prüfe ob .next Verzeichnis existiert
            if [ ! -d ".next" ]; then
              echo "ERROR: .next directory not found!"
              exit 1
            fi
            echo "✓ .next directory exists"
            
            # Starte Server in Screen-Session
            echo "Starting server in screen session..."
            cd "\$DEPLOY_PATH"
            export NODE_ENV=production
            
            # Lade nvm falls vorhanden (für Node.js via nvm)
            if [ -s "\$HOME/.nvm/nvm.sh" ]; then
              echo "Loading nvm..."
              export NVM_DIR="\$HOME/.nvm"
              [ -s "\$NVM_DIR/nvm.sh" ] && . "\$NVM_DIR/nvm.sh"
            elif [ -s "/root/.nvm/nvm.sh" ]; then
              echo "Loading nvm from /root..."
              export NVM_DIR="/root/.nvm"
              [ -s "\$NVM_DIR/nvm.sh" ] && . "\$NVM_DIR/nvm.sh"
            fi
            
            # Prüfe ob Node.js verfügbar ist und erweitere PATH falls nötig
            if ! command -v node &> /dev/null; then
              echo "Node.js not found in PATH, searching in common locations..."
              # Suche nach Node.js in typischen Pfaden
              if [ -f "/usr/bin/node" ]; then
                export PATH="/usr/bin:\$PATH"
                echo "Found Node.js in /usr/bin"
              elif [ -f "/usr/local/bin/node" ]; then
                export PATH="/usr/local/bin:\$PATH"
                echo "Found Node.js in /usr/local/bin"
              elif [ -d "\$HOME/.nvm" ]; then
                # Aktiviere nvm und lade default Node.js
                export NVM_DIR="\$HOME/.nvm"
                [ -s "\$NVM_DIR/nvm.sh" ] && . "\$NVM_DIR/nvm.sh"
                nvm use default 2>/dev/null || nvm use node 2>/dev/null || true
                echo "Attempted to load nvm and use default Node.js version"
              elif [ -d "/root/.nvm" ]; then
                export NVM_DIR="/root/.nvm"
                [ -s "\$NVM_DIR/nvm.sh" ] && . "\$NVM_DIR/nvm.sh"
                nvm use default 2>/dev/null || nvm use node 2>/dev/null || true
                echo "Attempted to load nvm from /root and use default Node.js version"
              fi
            fi
            
            # Prüfe nochmal ob Node.js jetzt verfügbar ist
            if ! command -v node &> /dev/null; then
              echo "ERROR: Node.js could not be found!"
              echo "Current PATH: \$PATH"
              echo "Please ensure Node.js is installed and accessible."
              echo ""
              echo "Checking for Node.js in common locations:"
              ls -la /usr/bin/node 2>/dev/null || echo "  /usr/bin/node: not found"
              ls -la /usr/local/bin/node 2>/dev/null || echo "  /usr/local/bin/node: not found"
              which node 2>/dev/null || echo "  'which node': not found"
              exit 1
            fi
            
            NODE_VERSION=\$(node --version)
            NODE_PATH=\$(which node)
            echo "✓ Node.js found: \$NODE_VERSION at \$NODE_PATH"
            
            # Finde next-Binary (kann lokal in node_modules/.bin sein)
            NEXT_CMD=""
            if [ -f "./node_modules/.bin/next" ]; then
              # Verwende node explizit um das next Binary aufzurufen
              NEXT_CMD="node ./node_modules/.bin/next"
              echo "Using local next binary with node: \$NEXT_CMD"
            elif command -v next &> /dev/null; then
              NEXT_CMD="next"
              echo "Using system next command"
            else
              echo "ERROR: next command not found"
              echo "PATH: \$PATH"
              echo "Current directory: \$(pwd)"
              echo "node_modules/.bin contents:"
              ls -la node_modules/.bin/ 2>/dev/null | head -10 || echo "node_modules/.bin not found"
              exit 1
            fi
            
            # Starte Screen-Session mit Logging
            # Next.js lädt .env Dateien automatisch beim Start, wenn sie im Root-Verzeichnis sind
            # Wir müssen sicherstellen, dass die .env Datei vorhanden ist
            if [ ! -f ".env" ]; then
              echo "ERROR: .env file not found in deployment directory!"
              exit 1
            fi
            echo "✓ .env file exists, starting Next.js..."
            
            # Erstelle ein Startup-Script für die Screen-Session, das nvm lädt
            STARTUP_SCRIPT="/tmp/start-nextjs-\${SCREEN_SESSION}.sh"
            {
              echo "#!/bin/bash"
              echo "cd \"${DEPLOY_PATH}\""
              echo "export NODE_ENV=production"
              echo ""
              echo "# Setze Variablen"
              echo "NEXT_CMD=\"${NEXT_CMD}\""
              echo "PORT=\"${PORT}\""
              echo ""
              echo "# Lade nvm falls vorhanden"
              echo "if [ -s \"\\\$HOME/.nvm/nvm.sh\" ]; then"
              echo "  export NVM_DIR=\"\\\$HOME/.nvm\""
              echo "  [ -s \"\\\$NVM_DIR/nvm.sh\" ] && . \"\\\$NVM_DIR/nvm.sh\""
              echo "elif [ -s \"/root/.nvm/nvm.sh\" ]; then"
              echo "  export NVM_DIR=\"/root/.nvm\""
              echo "  [ -s \"\\\$NVM_DIR/nvm.sh\" ] && . \"\\\$NVM_DIR/nvm.sh\""
              echo "fi"
              echo ""
              echo "# Aktiviere default Node.js Version falls nvm geladen wurde"
              echo "if [ -n \"\\\$NVM_DIR\" ] && [ -s \"\\\$NVM_DIR/nvm.sh\" ]; then"
              echo "  nvm use default 2>/dev/null || nvm use node 2>/dev/null || true"
              echo "fi"
              echo ""
              echo "# Starte Next.js"
              echo "\$NEXT_CMD start --port \$PORT 2>&1 | tee /tmp/nextjs-start.log"
            } > "\$STARTUP_SCRIPT"
            chmod +x "\$STARTUP_SCRIPT"
            
            screen -dmS "\$SCREEN_SESSION" bash "\$STARTUP_SCRIPT"
            
            # Warte kurz und prüfe ob Screen-Session läuft
            sleep 3
            if screen -list | grep -q "\$SCREEN_SESSION"; then
              echo "✓ Screen session started successfully"
              # Zeige die ersten Zeilen des Logs falls vorhanden
              sleep 2
              if [ -f /tmp/nextjs-start.log ]; then
                echo "Next.js startup log (first 30 lines):"
                head -30 /tmp/nextjs-start.log || true
              fi
            else
              echo "ERROR: Screen session failed to start"
              echo "Checking for errors..."
              # Versuche den Fehler zu sehen
              if [ -f /tmp/nextjs-start.log ]; then
                echo "Next.js error log:"
                cat /tmp/nextjs-start.log || true
              fi
              # Versuche manuell zu starten um den Fehler zu sehen
              echo "Trying to start manually to see error..."
              # Lade nvm für manuellen Start
              if [ -s "\$HOME/.nvm/nvm.sh" ]; then
                export NVM_DIR="\$HOME/.nvm"
                [ -s "\$NVM_DIR/nvm.sh" ] && . "\$NVM_DIR/nvm.sh"
                nvm use default 2>/dev/null || nvm use node 2>/dev/null || true
              elif [ -s "/root/.nvm/nvm.sh" ]; then
                export NVM_DIR="/root/.nvm"
                [ -s "\$NVM_DIR/nvm.sh" ] && . "\$NVM_DIR/nvm.sh"
                nvm use default 2>/dev/null || nvm use node 2>/dev/null || true
              fi
              cd "\$DEPLOY_PATH" && export NODE_ENV=production && timeout 5 \$NEXT_CMD start --port \$PORT || echo "Manual start failed with error above"
              exit 1
            fi
            
            # Bereinige alte Backups (behalte nur die letzten 3)
            ls -dt .next.backup.* 2>/dev/null | tail -n +4 | xargs rm -rf || true
            ls -dt node_modules.backup.* 2>/dev/null | tail -n +4 | xargs rm -rf || true
            rm -f /tmp/frontend-${ENV}.tar.gz
            echo "Deployment completed successfully"
          EOF

      - name: Health check
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          PORT: ${{ needs.detect-environment.outputs.port }}
        run: |
          echo "Waiting for server to start..."
          sleep 15
          echo "Performing health check on localhost:${PORT} (via SSH)..."
          HEALTH_CHECK_PASSED=false
          
          for i in {1..10}; do
            echo "Health check attempt $i/10..."
            # Health check läuft auf dem Server direkt auf localhost
            HEALTH_CHECK_RESULT=$(ssh -o StrictHostKeyChecking=no ${SSH_USER}@${SSH_HOST} "curl -f -s -w '\nHTTP Status: %{http_code}\n' --max-time 10 --connect-timeout 5 http://localhost:${PORT} 2>&1 || echo 'error'")
            
            if echo "$HEALTH_CHECK_RESULT" | grep -q "HTTP Status: 200"; then
              echo "✓ Health check passed"
              echo "Response:"
              echo "$HEALTH_CHECK_RESULT"
              HEALTH_CHECK_PASSED=true
              break
            else
              if [ $i -lt 10 ]; then
                echo "Health check failed, retrying in 3 seconds..."
                echo "Response: $HEALTH_CHECK_RESULT"
                sleep 3
              fi
            fi
          done
          
          if [ "$HEALTH_CHECK_PASSED" = false ]; then
            echo "ERROR: Health check failed after 10 attempts"
            echo "Last response:"
            echo "$HEALTH_CHECK_RESULT"
            exit 1
          fi

  notify-slack:
    name: Notify Slack
    needs: [detect-environment, deploy]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check deployment status
        id: check-status
        run: |
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "color=good" >> $GITHUB_OUTPUT
            echo "emoji=✅" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "color=danger" >> $GITHUB_OUTPUT
            echo "emoji=❌" >> $GITHUB_OUTPUT
          fi

      - name: Send Slack notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          # Prüfe ob Slack Webhook URL gesetzt ist
          if [ -z "$SLACK_WEBHOOK_URL" ] || [ "$SLACK_WEBHOOK_URL" == "" ]; then
            echo "SLACK_WEBHOOK_URL not set, skipping Slack notification"
            exit 0
          fi
          
          ENV="${{ needs.detect-environment.outputs.environment }}"
          ENV_UPPER=$(echo "$ENV" | tr '[:lower:]' '[:upper:]')
          STATUS="${{ steps.check-status.outputs.status }}"
          EMOJI="${{ steps.check-status.outputs.emoji }}"
          COMMIT_MSG=$(echo "${{ github.event.head_commit.message }}" | sed 's/"/\\"/g' | sed 's/`/\\`/g')
          COMMIT_SHA="${{ github.sha }}"
          COMMIT_SHORT=$(echo "$COMMIT_SHA" | cut -c1-7)
          BRANCH="${{ github.ref_name }}"
          ACTOR="${{ github.actor }}"
          WORKFLOW_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          PORT="${{ needs.detect-environment.outputs.port }}"
          
          # Escape Commit-Message für JSON
          ESCAPED_COMMIT_MSG=$(echo "$COMMIT_MSG" | sed 's/\\/\\\\/g' | sed 's/"/\\"/g' | sed 's/$/\\n/' | tr -d '\n' | sed 's/\\n$//')
          
          # Erstelle Slack-Nachricht
          PAYLOAD=$(cat <<JSON
          {
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": "${EMOJI} Frontend Deployment ${ENV_UPPER}"
                }
              },
              {
                "type": "section",
                "fields": [
                  {
                    "type": "mrkdwn",
                    "text": "*Status:*\n${STATUS}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Environment:*\n${ENV}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Branch:*\n${BRANCH}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Port:*\n${PORT}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Commit:*\n<${WORKFLOW_URL}|${COMMIT_SHORT}>"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Triggered by:*\n${ACTOR}"
                  }
                ]
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Commit Message:*\n\`\`\`${ESCAPED_COMMIT_MSG}\`\`\`"
                }
              },
              {
                "type": "context",
                "elements": [
                  {
                    "type": "mrkdwn",
                    "text": "<${WORKFLOW_URL}|View Workflow Run>"
                  }
                ]
              }
            ]
          }
          JSON
          )
          
          curl -X POST -H 'Content-type: application/json' \
            --data "$PAYLOAD" \
            "$SLACK_WEBHOOK_URL"
